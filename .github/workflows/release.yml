name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: fdc-sds-gui-linux
            binary: dist/fdc-sds-gui
          - os: macos-latest
            artifact: fdc-sds-gui-macos
            binary: dist/fdc-sds-gui
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install build dependencies (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: sudo apt-get install -y autoconf automake libtool

      - name: Install build dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install autoconf automake libtool

      - name: Build fdcsds
        run: |
          cd external/fdc-sds
          ./autogen.sh
          ./configure
          make
          cp fdcsds ../../fdcsds

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build binary
        run: |
          pyinstaller --onefile --windowed --name fdc-sds-gui --paths=src --hidden-import=views --hidden-import=controllers --hidden-import=models --add-data "VERSION:." --add-binary "fdcsds:." src/app.py

      - name: Rename binary
        run: mv ${{ matrix.binary }} dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
